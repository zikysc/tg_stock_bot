name: CI - Code Quality & Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff Lint & Format 检查
        run: |
          ruff check .
          ruff format --check .

      - name: 敏感信息扫描 (detect-secrets)
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

      - name: Security Scan (Bandit)
        run: |
          pip install bandit
          bandit -r src/ -ll -ii   # -ll 低等级，-ii 忽略高置信度

      - name: 类型检查 (可选)
        run: mypy src/ || true

      - name: 运行测试 (如果有测试)
        run: pytest || true
